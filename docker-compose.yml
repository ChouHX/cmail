services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
      REDIS_URL: ${REDIS_URL:-}
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Use an existing Redis service by setting REDIS_URL in .env, for example:
  # REDIS_URL=redis://redis.example.internal:6379/0
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   command: ["redis-server", "--save", "", "--appendonly", "no"]
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5
